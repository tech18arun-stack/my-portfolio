server {
    listen 80;
    server_name arun.websitescorp.com;

    root /home/server/My_Sites/arun;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # High-performance caching for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Advanced Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
